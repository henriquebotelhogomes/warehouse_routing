# render.yaml
services:
  # --- API (Backend) ---
  - type: web
    name: warehouse-api
    env: docker
    plan: free
    region: ohio
    branch: master
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: PYTHONPATH
        value: /app/src
      - key: MODEL_SAVE_PATH
        value: /app/data/model.joblib
    # O Render injeta a porta automaticamente na variável $PORT
    dockerCommand: uvicorn warehouse_routing.api.main:app --host 0.0.0.0 --port $PORT

  # --- Dashboard (Frontend) ---
  - type: web
    name: warehouse-dashboard
    env: docker
    plan: free
    region: ohio
    branch: master
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: API_URL
        # Substitua pela URL real que o Render gerar para sua API
        value: https://warehouse-api-upii.onrender.com
      - key: PYTHONPATH
        value: /app/src
    dockerCommand: streamlit run src/warehouse_routing/app/dashboard.py --server.port $PORT --server.address 0.0.0.0