name: CI Quality Gate
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install .[dev]
      - name: Lint & Type Check
        run: |
          ruff check .
          mypy src/
      - name: Run Tests
        run: pytest tests/