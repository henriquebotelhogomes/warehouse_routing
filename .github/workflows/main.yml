# .github/workflows/main.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        # O uv sync instala o projeto + dev-dependencies de forma ultra rápida
        run: uv sync --dev

      - name: Run Ruff Check
        # O 'uv run' garante que o comando use o ambiente virtual correto
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Mypy
        run: uv run mypy src/

      - name: Run Tests
        run: uv run pytest tests/ --cov=src