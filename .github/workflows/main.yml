# .github/workflows/main.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true # Agora vai funcionar quando você subir o uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev # Alterado para usar o novo grupo

      - name: Run Ruff Check
        run: uv run ruff check . --fix # Adicionado --fix para resolver imports automaticamente

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Mypy
        run: uv run mypy src/

      - name: Run Tests
        run: uv run pytest tests/ --cov=src